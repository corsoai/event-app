<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Corso Offline</title>
    <meta name="theme-color" content="#000000" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000000;
        color: #d5d5d5;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }
      main {
        width: min(92vw, 520px);
        border: 1px solid #656565;
        border-radius: 8px;
        background: #111111;
        padding: 28px;
      }
      span {
        display: inline-grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 8px;
        background: #c0ff6b;
        color: #000000;
        font-weight: 800;
      }
      h1 {
        margin: 22px 0 10px;
        font-size: 24px;
      }
      p {
        color: #d5d5d5;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <span>C</span>
      <h1>You are offline</h1>
      <p>Corso is installed and ready. Reconnect to sync visitors, bills, complaints, announcements, and ID checks.</p>
    </main>
  </body>
</html>
